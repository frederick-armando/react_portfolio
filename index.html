  <style>
    @font-face {
      font-family: 'Core Sans C Fallback';
      src: local('Segoe UI'), local('Helvetica Neue'), local('Arial'), local('sans-serif');
      font-style: normal;
      font-weight: 400;
      size-adjust: 99.2%;
      ascent-override: 90%;
      descent-override: 22%;
      line-gap-override: 0%;
    }

    @font-face {
      font-family: 'Core Sans C Fallback';
      src: local('Segoe UI'), local('Helvetica Neue'), local('Arial'), local('sans-serif');
      font-style: normal;
      font-weight: 500;
      size-adjust: 99.6%;
      ascent-override: 91%;
      descent-override: 22%;
      line-gap-override: 0%;
    }

    @font-face {
      font-family: 'Core Sans C';
      src: url('/fonts/core-sans/core-sans-c-45-regular.woff2') format('woff2');
      font-style: normal;
      font-weight: 400;
      font-display: optional;
    }

    @font-face {
      font-family: 'Core Sans C';
      src: url('/fonts/core-sans/core-sans-c-55-medium.woff2') format('woff2');
      font-style: normal;
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: 'Core Sans C';
      src: url('/fonts/core-sans/core-sans-c-65-bold.woff2') format('woff2');
      font-style: normal;
      font-weight: 600;
      font-display: optional;
    }

    @font-face {
      font-family: 'Core Sans C';
      src: url('/fonts/core-sans/core-sans-c-65-bold.woff2') format('woff2');
      font-style: normal;
      font-weight: 700;
      font-display: optional;
    }

    @font-face {
      font-family: 'Core Sans C';
      src: url('/fonts/core-sans/core-sans-c-75-extra-bold.woff2') format('woff2');
      font-style: normal;
      font-weight: 800;
      font-display: optional;
    }

    :root {
      --font-family: 'Core Sans C', 'Core Sans C Fallback', 'Segoe UI', sans-serif;
      --color-surface: #ffffff;
      --color-body: #3e4250;
      --color-primary: #517bfc;
      --color-primary-600: #3b50c4;
      --header-height: 86px;
      --gradient-start: #517bfc;
      --gradient-end: #8728fe;
    }

    [data-theme="dark"] {
      --color-surface: #14151f;
      --color-body: #b0b3c4;
      --color-primary: #6d93ff;
      --color-primary-600: #5a7de8;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background-color: var(--color-surface);
      color: var(--color-body);
      font-family: var(--font-family);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--header-height);
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: #fff;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid var(--color-primary);
      border-bottom-color: transparent;
      border-radius: 50% !important;
      display: inline-block;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script>
    // FOUC prevention & CSS Deferral
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('themePreference'); } catch (e) { }
      var theme = stored === 'dark' || stored === 'light' ? stored
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#14151f' : '#517bfc');
    })();
  </script>
  <script>
    // Detect webp/avif support early for conditional font loading
    document.documentElement.className += ' js';
  </script>
  <noscript><style>.js-only{display:none!important}</style></noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
